<!DOCTYPE html>
<html lang="pt-BR">
    
<head>
    <title>Loren's workspace</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <!--    DESKTOP    -->

    <main>

        <!--  ICONS  -->
        <aside>

            <div class="top-icons">                
            <button id="icon-about" onclick="toggleWin('win-about')">
                <img src="assets/about.png" alt="About me">
            </button>

            <button id="icon-music" onclick="toggleWin('win-music')">
                <img src="assets/music1.png" alt="Music yippie">
            </button>    
            </div>


            <button id="icon-projects" onclick="toggleWin('win-projects')">
                <img src="assets/projects.png" alt="Projects">
            </button>

            <button id="icon-socials" onclick="toggleWin('win-socials')">
                <img src="assets/socials.png" alt="Socials">
            </button>

        </aside>

        <!--  ABOUT ME  -->
        <section id="win-about">

            <header>
                <h2>About me</h2>
                <button class="btn-close" onclick="closeWin('win-about')">X</button>
            </header>

            <article>

                <p>
                    Text
                </p>

                <p>
                    Student, programmer etcetc.....
                </p>

                <button class="btn-link" onclick="toggleWin('win-journey')">
                    My journey
                </button>

            </article>

        </section>

        <!-- JOURNEY  -->
        <section id="win-journey">

            <header>
                <h2>My journey :l</h2>
                <button class="btn-close" onclick="closeWin('win-journey')">X</button>
            </header>

            <article>

                <ul>
                    <li>Ano 1</li>
                    <li>Ano 2</li>
                    <li>Ano 3</li>
                    <li>Ano 4</li>
                </ul>

            </article>

        </section>

        <!-- SOCIALS  -->
        <section id="win-socials">

            <header>
                <h2>Socials & Contact</h2>
                <button class="btn-close" onclick="closeWin('win-socials')">X</button>
            </header>

            <nav>
                <a class="social-btn" href="#">Github</a>
                <a class="social-btn" href="#">Discord</a>
                <a class="social-btn" href="#">Instagram</a>
            </nav>

        </section>

        <!-- PROJECTS -->
        <section id="win-projects">
            
            <header>
                <h2>Projects</h2>
                <button class="btn-close" onclick="closeWin('win-projects')">X</button>
            </header>

            <article>

                <h3>PROJECT EXAMPLE</h3>

                <p>
                    project description
                </p>

                <hr>

                <h3>Portfolio</h3>

                <p>
                    description
                </p>

            </article>

        </section>

        <!-- MUSIC -->
        <section id="win-music">

            <header>
                <h2>Music</h2>
                <button class="btn-close" onclick="closeWin('win-music')">X</button>
            </header>

            <article class="player">

                <div class="player-cover">
                    <img src="https://i.scdn.co/image/ab67616d0000b27393863f00132e7aeb77166c35">
                </div>

                <div class="player-info">
                    <p class="player-title">I'm Not Them</p>
                    <p class="player-artist">Them & I</p>
                </div>

                <div class="player-bar">
                    <span id="player-current">0:00</span>
                    <input type="range" id="player-seek" value="0" min="0" step="1">
                    <span id="player-duration">0:00</span>
                </div>

                <div class="player-controls">
                    <button id="btn-prev">⏮</button>
                    <button id="btn-play">▶</button>
                    <button id="btn-next">⏭</button>
                </div>

                <audio id="player-audio">
                    <source src="assets/ImNotThem.mp3" type="audio/mpeg">
                </audio>
            </article>

        </section>

        <!--  TASKBAR -->
        <footer>

            <!--  CLOCK  -->
            <section id="win-clock">

                <h3>Clock</h3>

                <label for="timezone">
                    Time Zone
                </label>

                <select id="timezone">

                    <option value="America/Sao_Paulo">São Paulo (UTC-3:00)</option>
                    <option value="America/Toronto">Toronto (UTC-5:00)</option>

                    <option>
                        Option 3
                    </option>

                    <option>
                        Option 4
                    </option>

                </select>

                <p>
                    00:00
                </p>

            </section>

        </footer>

    </main>

    <script src="script.js"></script>

</body>

</html>
